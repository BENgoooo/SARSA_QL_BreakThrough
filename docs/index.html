<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e17">
  <title>强化学习任务书展示</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #080d16;
      --panel: #111927;
      --border: #26344d;
      --text: #e7edf7;
      --muted: #9aa8bd;
      --accent: #00e5a0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--text);
      font-family:
        Inter, "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    .viewer {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      width: 100%;
      height: 100%;
      min-height: 100dvh;
    }

    .toolbar {
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 64px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(17, 25, 39, 0.96);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
    }

    .brand {
      min-width: max-content;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .brand span {
      color: var(--accent);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      width: 100%;
    }

    label {
      color: var(--muted);
      font-size: 13px;
    }

    select,
    .button {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0c1320;
      color: var(--text);
      font: inherit;
    }

    select {
      width: min(360px, 48vw);
      padding: 0 36px 0 12px;
      cursor: pointer;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }

    select:hover,
    select:focus,
    .button:hover,
    .button:focus {
      border-color: var(--accent);
      outline: none;
    }

    .document-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #fff;
    }

    @media (max-width: 700px) {
      .toolbar {
        align-items: stretch;
        flex-direction: column;
        gap: 8px;
        padding: 10px 12px;
      }

      .brand {
        text-align: center;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }

      select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="viewer">
    <header class="toolbar">
      <div class="brand"><span>SARSA</span> vs Q-Learning 任务书</div>
      <div class="controls">
        <label for="document-select">展示版本</label>
        <select id="document-select">
          <option value="prompts/Zhipu_SARSA_QL_RL_revised.html">
            暗影潜行 - 智谱修订版
          </option>
          <option value="prompts/Zhipu_SARSA_QL_RL.html">
            暗影潜行 - 智谱原版
          </option>
          <option value="prompts/Xiaomimo_SARSA_QL_RL.html">
            贪吃蛇 - Xiaomi MiMo
          </option>
          <option value="prompts/Qwen_SARSA_QL_RL.html">
            深海迷航 - Qwen
          </option>
        </select>
        <a
          id="open-document"
          class="button"
          href="prompts/Zhipu_SARSA_QL_RL_revised.html"
          target="_blank"
          rel="noopener"
        >
          新窗口打开
        </a>
      </div>
    </header>

    <iframe
      id="document-frame"
      class="document-frame"
      src="prompts/Zhipu_SARSA_QL_RL_revised.html"
      title="强化学习任务书"
      scrolling="yes"
    ></iframe>
  </main>

  <script>
    const select = document.getElementById("document-select");
    const frame = document.getElementById("document-frame");
    const openLink = document.getElementById("open-document");
    const documents = new Set(
      Array.from(select.options, (option) => option.value)
    );

    function showDocument(path, updateHistory = true) {
      if (!documents.has(path)) {
        path = select.options[0].value;
      }

      select.value = path;
      frame.src = path;
      openLink.href = path;

      if (updateHistory) {
        const url = new URL(window.location.href);
        url.searchParams.set("document", path);
        window.history.replaceState(null, "", url);
      }
    }

    select.addEventListener("change", () => {
      showDocument(select.value);
    });

    const initialDocument = new URLSearchParams(window.location.search).get(
      "document"
    );
    showDocument(initialDocument, false);
  </script>
</body>
</html>
